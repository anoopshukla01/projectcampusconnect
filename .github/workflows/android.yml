name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: campus-connect-react/package-lock.json

      - name: Install Dependencies
        run: |
          cd campus-connect-react
          npm ci

      - name: Build React App
        run: |
          cd campus-connect-react
          npm run build

      - name: Capacitor Sync
        run: |
          cd campus-connect-react
          npx cap sync

      - name: Build Android Debug APK
        run: |
          cd campus-connect-react/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: campus-connect-debug-apk
          path: campus-connect-react/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
